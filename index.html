<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>CI/CD - Integração Contínua</title>

  <!-- Conectando CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>CI/CD na Prática 🚀</h1>
  <p>Integração e Entrega Contínua</p>
</header>

<section>
  <div class="card">
    <h2>🔄 O que é CI?</h2>
    <p>
      Integração Contínua é quando os desenvolvedores enviam código frequentemente
      e o sistema testa automaticamente.
    </p>
  </div>

  <div class="card">
    <h2>🚀 O que é CD?</h2>
    <p>
      Entrega Contínua automatiza a entrega do sistema, deixando pronto para produção.
    </p>
  </div>

  <div class="card">
    <h2>⚙️ Simular Pipeline</h2>
    <button onclick="executarPipeline()">Executar Pipeline</button>
    <div id="resultado"></div>
  </div>
</section>

<!-- Conectando JS -->
<script src="script.js"></script>

</body>
</html>
